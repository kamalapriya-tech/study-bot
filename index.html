<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyBot - AI Study Assistant</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="header-content">
        <div class="bot-avatar">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <div class="bot-info">
          <h3>StudyBot</h3>
          <span class="status"><i class="fas fa-circle"></i> Online</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline-light btn-sm" onclick="generateSyllabus()" title="Generate Study Plan">
          <i class="fas fa-calendar-alt"></i>
        </button>
        <button class="btn btn-outline-light btn-sm" onclick="clearChat()" title="Clear Chat">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>

    <div class="chat-messages" id="chatBox">
      <div class="welcome-message">
        <div class="bot-avatar-small">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <div class="message-content">
          <p>Hello! I'm StudyBot, your AI study assistant. How can I help you with your studies today?</p>
          <div class="quick-questions">
            <button class="quick-btn" onclick="sendQuickMessage('Help me with math')">📐 Math Help</button>
            <button class="quick-btn" onclick="sendQuickMessage('Explain science concepts')">🔬 Science</button>
            <button class="quick-btn" onclick="sendQuickMessage('History questions')">📚 History</button>
            <button class="quick-btn" onclick="sendQuickMessage('English grammar')">📝 English</button>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-input-container">
      <div class="input-group">
        <input type="text" id="userInput" class="form-control" placeholder="Ask me anything about your studies..." autocomplete="off">
        <button class="btn btn-primary send-btn" onclick="sendMessage()" id="sendButton">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="input-footer">
        <small class="text-muted">Press Enter to send • StudyBot is here to help!</small>
      </div>
    </div>
  </div>

  <script src="javascript/script.js"></script>
</body>
</html>
